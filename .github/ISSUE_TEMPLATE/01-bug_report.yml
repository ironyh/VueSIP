name: Bug report
description: Report unexpected behavior in the library or official templates
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a problem. Security issues: use **SECURITY.md** (private reporting), not this form.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Short summary of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: How can we reproduce it?
      description: Steps, minimal code, or a link to a branch. For templates, say which `templates/...` app.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: vuesip version
      description: npm version or git SHA
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: e.g. Vue 3.5.x, browser, Node 20, PBX if relevant
    validations:
      required: false
