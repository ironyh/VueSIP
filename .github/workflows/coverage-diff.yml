name: Coverage Diff

# Generates coverage report and posts diff comment on PRs
# Shows coverage change compared to base branch

on:
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read
  pull-requests: write

jobs:
  coverage-base:
    name: Generate Base Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.base_ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build package
        run: pnpm run build

      - name: Generate base coverage
        run: pnpm run coverage:unit

      - name: Upload base coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-base
          path: coverage/coverage-summary.json
          retention-days: 1

  coverage-pr:
    name: Generate PR Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build package
        run: pnpm run build

      - name: Generate PR coverage
        run: pnpm run coverage:unit

      - name: Upload PR coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-pr
          path: coverage/coverage-summary.json
          retention-days: 1

  coverage-diff:
    name: Post Coverage Diff
    runs-on: ubuntu-latest
    needs: [coverage-base, coverage-pr]
    if: always()
    steps:
      - name: Download base coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-base
          path: coverage-base

      - name: Download PR coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-pr
          path: coverage-pr

      - name: Generate diff report
        id: diff
        run: |
          node -e "
          const fs = require('fs');
          
          const basePath = 'coverage-base/coverage-summary.json';
          const prPath = 'coverage-pr/coverage-summary.json';
          
          let base = null;
          let pr = null;
          
          if (fs.existsSync(basePath)) {
            base = JSON.parse(fs.readFileSync(basePath, 'utf8')).total;
          }
          if (fs.existsSync(prPath)) {
            pr = JSON.parse(fs.readFileSync(prPath, 'utf8')).total;
          }
          
          if (!base || !pr) {
            console.log('SKIP_DIFF=true');
            console.log('MISSING_DATA=true');
            process.exit(0);
          }
          
          const metrics = ['lines', 'statements', 'functions', 'branches'];
          const results = [];
          let anyChange = false;
          
          for (const m of metrics) {
            const basePct = base[m]?.pct ?? 0;
            const prPct = pr[m]?.pct ?? 0;
            const diff = prPct - basePct;
            const diffStr = diff >= 0 ? '+' + diff.toFixed(2) : diff.toFixed(2);
            const icon = diff > 0 ? '🟢' : diff < 0 ? '🔴' : '⚪';
            
            if (diff !== 0) anyChange = true;
            
            results.push({
              metric: m.charAt(0).toUpperCase() + m.slice(1),
              base: basePct.toFixed(2),
              pr: prPct.toFixed(2),
              diff: diffStr,
              icon: icon
            });
          }
          
          // Generate markdown table
          const md = [
            '## 📊 Coverage Diff',
            '',
            '| Metric | Base | PR | Diff |',
            '|--------|------|-----|------|',
            ...results.map(r => \`| \${r.icon} \${r.metric} | \${r.base}% | \${r.pr}% | \${r.diff}% |\`),
            '',
            anyChange 
              ? (results.some(r => parseFloat(r.diff) < 0) 
                ? '⚠️ Coverage decreased in some areas. Consider adding tests.' 
                : '✅ Coverage improved!') 
              : '➖ No coverage change.'
          ].join('\\n');
          
          fs.writeFileSync('coverage-diff.md', md);
          console.log('SKIP_DIFF=false');
          console.log('ANY_CHANGE=' + anyChange);
          "
          
          cat coverage-diff.md >> "$GITHUB_OUTPUT" || true
        shell: bash

      - name: Find existing comment
        if: steps.diff.outputs.SKIP_DIFF != 'true'
        id: find-comment
        uses: actions/github-script@v7
        with:
          script: |
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });
            const botComment = comments.data.find(c => 
              c.user?.login === 'github-actions[bot]' &&
              c.body?.includes('📊 Coverage Diff')
            );
            return botComment?.id || '';

      - name: Post or update comment
        if: steps.diff.outputs.SKIP_DIFF != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('coverage-diff.md', 'utf8');
            const commentId = '${{ steps.find-comment.outputs.result }}';
            
            if (commentId && commentId !== 'null') {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: parseInt(commentId),
                body: body,
              });
              console.log('Updated existing comment');
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: body,
              });
              console.log('Created new comment');
            }
