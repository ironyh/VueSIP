name: Security Audit

on:
  push:
    branches:
      - main
      - develop
      - 'claude/**'
  pull_request:
    branches:
      - main
      - develop
  schedule:
    # Run daily at 06:00 UTC to catch new vulnerabilities
    - cron: '0 6 * * *'

jobs:
  audit:
    name: Dependency Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # npm registry retired legacy audit endpoints (410); `pnpm audit` fails until pnpm 11+ lockfile support.
      # Bulk advisory API: https://api-docs.npmjs.com/#tag/Audit
      - name: Run security audit (high/critical only)
        run: node scripts/npm-registry-bulk-audit.mjs high
        continue-on-error: false
