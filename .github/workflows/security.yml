name: Security Audit

on:
  push:
    branches:
      - main
      - develop
      - 'claude/**'
  pull_request:
    branches:
      - main
      - develop
  schedule:
    # Run daily at 06:00 UTC to catch new vulnerabilities
    - cron: '0 6 * * *'

jobs:
  audit:
    name: Dependency Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run security audit (high/critical only)
        run: pnpm audit --audit-level=high
        continue-on-error: false

      - name: Audit summary
        if: always()
        run: |
          echo "📊 Security Audit Summary"
          pnpm audit --audit-level=low --json 2>/dev/null | jq -r '
            .advisories | length as $total |
            .advisories | map(select(.severity == "critical")) | length as $critical |
            .advisories | map(select(.severity == "high")) | length as $high |
            .advisories | map(select(.severity == "moderate")) | length as $moderate |
            .advisories | map(select(.severity == "low")) | length as $low |
            "Total vulnerabilities: \($total) | Critical: \($critical) | High: \($high) | Moderate: \($moderate) | Low: \($low)"
          ' || echo "Audit JSON parsing failed (non-fatal)"
