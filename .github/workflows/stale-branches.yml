name: Stale Branch Management

on:
  schedule:
    - cron: '0 3 * * 0' # Runs every Sunday at 3 AM UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run mode'
        required: false
        default: 'false'

jobs:
  stale_branches:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find stale branches
        id: stale
        env:
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          # Default branches to protect
          PROTECTED_BRANCHES="main|development|beads-sync"

          # Get merged branches (merged into main)
          MERGED_BRANCHES=$(git branch --merged origin/main | grep -vE "^[*+]?(${PROTECTED_BRANCHES})$" | sed 's/^[ *]*//' | grep -v "^$")

          # Get stale branches (no commits in last 90 days)
          STALE_BRANCHES=$(git for-each-ref --format='%(refname:short)' --sort=-committerdate refs/heads/ | \
            while read branch; do
              last_commit=$(git log -1 --format=%ci "$branch" 2>/dev/null)
              if [ -n "$last_commit" ]; then
                age_days=$(( ($(date +%s) - $(date -d "$last_commit" +%s)) / 86400 ))
                if [ $age_days -gt 90 ]; then
                  echo "$branch"
                fi
              fi
            done | grep -vE "^(${PROTECTED_BRANCHES})$")

          # Combine and dedupe
          ALL_STALE=$(echo -e "${MERGED_BRANCHES}\n${STALE_BRANCHES}" | sort -u | grep -v "^$")

          if [ -z "$ALL_STALE" ]; then
            echo "No stale branches found"
            echo "branches=" >> $GITHUB_OUTPUT
          else
            echo "Found stale branches:"
            echo "$ALL_STALE"
            # Output as JSON array
            echo "branches=$(echo '$ALL_STALE' | jq -R . | jq -s .)" >> $GITHUB_OUTPUT
          fi

      - name: Create stale branch report
        if: steps.stale.outputs.branches != ''
        env:
          BRANCHES: ${{ steps.stale.outputs.branches }}
        run: |
          echo "## Stale Branches Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The following branches may be candidates for cleanup:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for branch in $(echo '$BRANCHES' | jq -r '.[]'); do
            echo "- \`$branch\`" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Action needed**: Review and delete these branches if they are no longer needed." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "To delete a branch locally:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "git branch -d <branch-name>" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "To delete a remote branch:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "git push origin --delete <branch-name>" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: Create PR for branch cleanup
        if: steps.stale.outputs.branches != '' && github.event.inputs.dry_run != 'true'
        env:
          BRANCHES: ${{ steps.stale.outputs.branches }}
        run: |
          # Create a branch for the cleanup PR
          git checkout -b chore/stale-branch-cleanup-$(date +%Y%m%d)

          # Create cleanup script
          cat > scripts/stale-branches.md << 'EOF'
          # Stale Branch Cleanup

          Generated: $(date)

          ## Branches to Review
          $(echo '$BRANCHES' | jq -r '.[]' | sed 's/^/- /')

          ## Decision Log

          | Branch | Decision | PR/Issue |
          EOF

          git add scripts/stale-branches.md
          git commit -m "chore: stale branch review $(date +%Y-%m-%d)"

          # Push and create PR
          git push -u origin chore/stale-branch-cleanup-$(date +%Y%m%d) || echo "Push failed, skipping PR"

          echo "Dry run complete. In non-dry-run mode, would create cleanup PR."
