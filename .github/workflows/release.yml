name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

# IMPORTANT: Repository settings must allow Actions to create PRs.
# Go to: Settings > Actions > General > Workflow permissions
# Enable: "Allow GitHub Actions to create and approve pull requests"
# Without this, release-please will fail with:
#   "GitHub Actions is not permitted to create or approve pull requests"
permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check Actions permissions
        run: |
          echo "=== Token PR-creation test ==="
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -X POST "https://api.github.com/repos/${{ github.repository }}/pulls" \
            -H "Content-Type: application/json" \
            -d '{"title":"release-please-token-test","body":"CI diagnostic","head":"release-please-diagnostic-branch","base":"main"}')
          echo "HTTP_STATUS:$HTTP_STATUS"
          if [ "$HTTP_STATUS" = "201" ] || [ "$HTTP_STATUS" = "422" ]; then
            echo "✓ Token can create PRs (HTTP $HTTP_STATUS)"
          else
            echo "✗ Token CANNOT create PRs (HTTP $HTTP_STATUS)"
          fi
      - uses: google-github-actions/release-please-action@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release-type: node
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
        env:
          # Avoid Node.js 20 deprecation warning; v3 uses Node 20 internally
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
