# Build vuesip (vite + tsc), write dist/package.json, upload dist/ as vuesip-dist artifact.
# Used by Deploy Starter Templates and Template Smoke (PR).

name: Reusable - Build vuesip dist

on:
  workflow_call:

jobs:
  build:
    name: Build VueSip Library
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build library
        run: pnpm run build

      - name: Create dist package.json
        run: node scripts/write-dist-package-json.mjs

      - name: Upload library artifact
        uses: actions/upload-artifact@v4
        with:
          name: vuesip-dist
          path: dist/
          retention-days: 1
