name: Demo Health Check

on:
  schedule:
    # Run every 30 minutes
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4

      - id: check
        name: Check Live Demos
        run: |
          echo "🏥 VueSIP Demo Health Check"
          echo "Time: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          echo "================================"
          
          FAILED=0
          PASSED=0
          FAILED_DEMOS=""
          
          check_endpoint() {
            local url="$1"
            local name="$2"
            if curl -sf --max-time 15 "$url" > /dev/null 2>&1; then
              echo "✅ $name: OK"
              PASSED=$((PASSED+1))
            else
              echo "❌ $name: FAILED"
              FAILED=$((FAILED+1))
              FAILED_DEMOS="${FAILED_DEMOS}${name}, "
            fi
          }
          
          echo ""
          echo "🌐 Live Demos"
          echo "-------------"
          check_endpoint "https://softphone.vuesip.com" "Softphone PWA"
          check_endpoint "https://basic-softphone.vuesip.com" "Basic Softphone"
          check_endpoint "https://video.vuesip.com" "Video Room"
          check_endpoint "https://callcenter.vuesip.com" "Call Center"
          
          echo ""
          echo "================================"
          echo "📊 Summary: $PASSED passed, $FAILED failed"
          
          # Set outputs for next steps
          echo "failed_count=$FAILED" >> $GITHUB_OUTPUT
          echo "passed_count=$PASSED" >> $GITHUB_OUTPUT
          echo "failed_demos=$FAILED_DEMOS" >> $GITHUB_OUTPUT
          
          exit $FAILED

      - name: Create GitHub Issue on Failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const failedCount = parseInt('${{ steps.check.outputs.failed_count || 0 }}');
            const failedDemos = '${{ steps.check.outputs.failed_demos }}' || 'Unknown';
            
            // Check for existing open issue
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['demo-health', 'alert']
            });
            
            const existingIssue = issues.find(i => i.title.includes('Demo Health Alert'));
            
            if (existingIssue) {
              // Update existing issue with new failure info
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: `⚠️ **Demo Health Alert** - Updated at ${new Date().toISOString()}\n\n**Failed Demos:** ${failedDemos}\n\n> This issue is auto-generated by the demo health check workflow. It will auto-close when demos recover.`
              });
              console.log(`Updated existing issue #${existingIssue.number}`);
            } else {
              // Create new issue
              const { data: newIssue } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `🚨 Demo Health Alert - ${failedCount} demo(s) down`,
                body: `## Demo Health Alert\n\n**Time:** ${new Date().toISOString()}\n**Failed Demos:** ${failedDemos}\n\n### Action Required\n\n1. Check deployment status\n2. Verify CDN/cloudflare configuration\n3. Check for recent deploys that may have caused issues\n\n---\n> 🤖 Auto-generated by \`demo-health.yml\` workflow`,
                labels: ['demo-health', 'alert', 'automated']
              });
              console.log(`Created new issue #${newIssue.number}`);
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Close Issue on Success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['demo-health', 'alert']
            });
            
            const openAlert = issues.find(i => i.title.includes('Demo Health Alert'));
            
            if (openAlert) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: openAlert.number,
                state: 'closed',
                body: `✅ **Resolved** - All demos healthy at ${new Date().toISOString()}\n\n---\n> 🤖 Auto-closed by \`demo-health.yml\` workflow`
              });
              console.log(`Closed issue #${openAlert.number}`);
            }