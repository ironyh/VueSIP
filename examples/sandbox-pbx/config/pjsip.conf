; VueSIP sandbox PBX — WebRTC endpoints over WSS, no outbound, no trust.

[transport-ws]
type=transport
protocol=ws
bind=0.0.0.0:8088

[transport-wss]
type=transport
protocol=wss
bind=0.0.0.0:8089
cert_file=/etc/asterisk/keys/sandbox.pem
priv_key_file=/etc/asterisk/keys/sandbox.pem

; --- Shared endpoint template for demo users -------------------------------
[demo-endpoint](!)
type=endpoint
context=sandbox
disallow=all
allow=opus,ulaw,alaw
webrtc=yes
use_avpf=yes
media_encryption=dtls
dtls_verify=fingerprint
dtls_setup=actpass
ice_support=yes
media_use_received_transport=yes
rtcp_mux=yes
rewrite_contact=yes
force_rport=yes
direct_media=no

[demo-aor](!)
type=aor
max_contacts=3
remove_existing=yes
qualify_frequency=30

[demo-auth](!)
type=auth
auth_type=userpass

; --- Six shared sandbox accounts (demo1..demo6) ----------------------------
; Passwords are intentionally public — this is a shared sandbox, not prod.
; Anyone can call anyone; rate-limited at the edge.

[demo1](demo-endpoint)
auth=demo1
aors=demo1
callerid="Demo 1" <demo1>
[demo1](demo-auth)
username=demo1
password=sandbox-demo1
[demo1](demo-aor)

