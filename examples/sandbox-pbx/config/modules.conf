[modules]
autoload=yes

; chan_sip claims the 'sip' WebSocket sub-protocol at load time, which
; prevents res_pjsip_transport_websocket from registering — so incoming
; WSS upgrade requests hit a 501. We don't use chan_sip anywhere, so
; nuke it along with a few other deprecated channels we never need.
noload => chan_sip.so
noload => chan_mgcp.so
noload => chan_skinny.so
noload => chan_unistim.so
noload => res_monitor.so
