[general]
enabled=yes
port=5038
bindaddr=0.0.0.0
webenabled=yes
allowmultiplelogin=yes
displayconnects=yes

; AMI user for the call-center demo. Read-only on most things; can originate
; calls into the sandbox context only (refused for external URIs by the
; dialplan's catch-all).
[sandbox]
secret=sandbox-ami-demo
deny=0.0.0.0/0
permit=0.0.0.0/0
read=system,call,log,verbose,agent,user,config,dtmf,reporting,cdr,dialplan
write=system,call,agent,user,config,command,reporting,originate
writetimeout=5000
