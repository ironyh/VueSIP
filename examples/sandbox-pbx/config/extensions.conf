; VueSIP sandbox dialplan — safe-by-default.
; No trunk, no outbound. Only demo apps and peer-to-peer calls between
; registered sandbox endpoints.

[general]
static=yes
writeprotect=yes
autofallthrough=yes

[globals]

; ---------------------------------------------------------------------------
; [sandbox] — context every demo endpoint runs in.
; ---------------------------------------------------------------------------
[sandbox]

; --- Self-test / informational ---------------------------------------------
; 600  Echo test — hear yourself, verify mic + speaker + codec negotiation.
exten => 600,1,NoOp(Echo test)
 same => n,Answer()
 same => n,Wait(1)
 same => n,Playback(demo-echotest)
 same => n,Echo()
 same => n,Hangup()

; 601  Playback — music/announcement for one-way media tests.
exten => 601,1,NoOp(Playback demo)
 same => n,Answer()
 same => n,Wait(1)
 same => n,Playback(demo-congrats)
 same => n,Hangup()

; 602  Milliwatt tone — continuous test tone, handy for RTP loss checks.
exten => 602,1,NoOp(Milliwatt test tone)
 same => n,Answer()
 same => n,Milliwatt()
 same => n,Hangup()

; --- Conference room ------------------------------------------------------
; 8000  ConfBridge — up to 10 peers share one room (see confbridge.conf).
exten => 8000,1,NoOp(Sandbox conf bridge)
 same => n,Answer()
 same => n,ConfBridge(sandbox,sandbox_bridge,sandbox_user)
 same => n,Hangup()

; --- Voicemail ------------------------------------------------------------
; 700  Call your own voicemail box (demoN -> mailbox N).
exten => 700,1,NoOp(Voicemail main for ${CALLERID(num)})
 same => n,Answer()
 same => n,VoiceMailMain(${CALLERID(num)}@sandbox,s)
 same => n,Hangup()

; --- Peer-to-peer between sandbox endpoints --------------------------------
; demo1..demo6 reach each other by extension name.
exten => demo1,1,Dial(PJSIP/demo1,30)
exten => demo2,1,Dial(PJSIP/demo2,30)
exten => demo3,1,Dial(PJSIP/demo3,30)
exten => demo4,1,Dial(PJSIP/demo4,30)
exten => demo5,1,Dial(PJSIP/demo5,30)
exten => demo6,1,Dial(PJSIP/demo6,30)

; --- Bot agents (auto-answering endpoints) ---------------------------------
; 101 / 102 are headless "agents" that answer instantly and play hold music.
; Used for call-transfer, call-waiting, and conference-invite demos — you
; don't need a second human on the line to exercise multi-call flows.
exten => 101,1,NoOp(Bot agent Alice)
 same => n,Answer()
 same => n,Set(CHANNEL(language)=en)
 same => n,MusicOnHold(default,10)
 same => n,Playback(demo-thanks)
 same => n,Hangup()

exten => 102,1,NoOp(Bot agent Bob)
 same => n,Answer()
 same => n,Set(CHANNEL(language)=en)
 same => n,MusicOnHold(default,10)
 same => n,Playback(vm-goodbye)
 same => n,Hangup()

; --- Catch-all: refuse anything else ---------------------------------------
; Crucial: without this, a creative attacker could route to arbitrary
; local contexts. Respond 603 Decline so clients stop retrying.
exten => _X.,1,NoOp(Blocked: ${EXTEN} is not a sandbox target)
 same => n,Busy(2)
 same => n,Hangup(21)

exten => _[a-zA-Z].,1,NoOp(Blocked named extension: ${EXTEN})
 same => n,Busy(2)
 same => n,Hangup(21)

; Hangup handler for clean CDR
exten => h,1,NoOp(Hangup on ${CHANNEL})
